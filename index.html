<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#dbeafe">
<meta name="description" content="ACG游戏社官方发布页">
<title>ACG游戏社</title>
<style>
:root{--text-main:#15171c;--text-secondary:#5f6470;--primary-start:#4facfe;--primary-end:#00c6ff;--card-bg:rgba(255,255,255,.68);--card-border:rgba(255,255,255,.92)}
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;min-height:100%}
body{min-height:100vh;position:relative;display:flex;align-items:center;justify-content:center;overflow-x:hidden;padding:max(28px,env(safe-area-inset-top)) 20px max(28px,env(safe-area-inset-bottom));background:radial-gradient(circle at 30% 20%,#e8f2ff 0%,#dbeafe 48%,#c7d2fe 100%);color:var(--text-main);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased}
body.modal-open{overflow:hidden}button,a{font:inherit;-webkit-tap-highlight-color:transparent}
.ambient-light{position:fixed;z-index:0;pointer-events:none;border-radius:50%;filter:blur(18px)}
.ambient-light.main{width:720px;height:720px;top:50%;left:50%;transform:translate(-50%,-52%);background:radial-gradient(circle,rgba(255,255,255,.72) 0%,rgba(215,239,255,.46) 30%,rgba(130,186,255,.20) 58%,rgba(130,186,255,0) 76%)}
.ambient-light.top{width:420px;height:420px;top:-170px;right:-110px;background:radial-gradient(circle,rgba(255,255,255,.56) 0%,rgba(166,214,255,.24) 48%,rgba(166,214,255,0) 74%)}
.ambient-light.bottom{width:460px;height:460px;left:-170px;bottom:-210px;background:radial-gradient(circle,rgba(181,205,255,.32) 0%,rgba(146,181,255,.14) 48%,rgba(146,181,255,0) 76%)}
.container{position:relative;z-index:2;width:90%;max-width:380px;text-align:center;transform:translateY(5vh)}
.brand{margin-bottom:30px}.avatar-wrap{position:relative;width:116px;height:116px;display:flex;align-items:center;justify-content:center;margin:0 auto 13px;border-radius:50%;background:rgba(255,255,255,.24);box-shadow:0 0 34px rgba(119,180,255,.35)}
.avatar-wrap::before{content:"";position:absolute;inset:-38px;z-index:-1;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.54) 0%,rgba(152,205,255,.24) 44%,rgba(152,205,255,0) 72%);filter:blur(8px)}
.avatar{width:92px;height:92px;border:3px solid rgba(255,255,255,.96);border-radius:50%;background:url("./assets/avatar.webp") center/cover no-repeat;box-shadow:0 10px 26px rgba(46,76,119,.18),0 0 20px rgba(120,180,255,.42)}
.title{margin-bottom:7px;color:var(--text-main);font-size:24px;font-weight:700;line-height:1.4}.desc{color:var(--text-secondary);font-size:15px;font-weight:400;line-height:1.7;letter-spacing:.3px}.brand-line{width:42px;height:3px;margin:14px auto 0;border-radius:999px;background:rgba(255,255,255,.72);box-shadow:0 2px 8px rgba(95,129,180,.12)}
.menu{display:flex;flex-direction:column;gap:14px}.btn{width:100%;min-height:62px;display:flex;align-items:center;justify-content:center;gap:9px;padding:15px 20px;border:1px solid var(--card-border);border-radius:18px;background:var(--card-bg);color:#17191f;box-shadow:0 10px 24px rgba(61,91,135,.10),inset 0 1px 0 rgba(255,255,255,.75);text-decoration:none;cursor:pointer;backdrop-filter:blur(11px);-webkit-backdrop-filter:blur(11px);transition:transform .2s ease,background-color .2s ease,box-shadow .2s ease}.btn:hover{transform:translateY(-2px);background:rgba(255,255,255,.9);box-shadow:0 14px 28px rgba(61,91,135,.14),inset 0 1px 0 rgba(255,255,255,.85)}.btn:active{transform:scale(.985)}
.btn.primary{border:none;background:linear-gradient(135deg,var(--primary-start),var(--primary-end));color:#fff;box-shadow:0 13px 28px rgba(22,172,229,.25)}.btn.primary:hover{background:linear-gradient(135deg,#3f9df8,#00b5ee);box-shadow:0 16px 32px rgba(22,172,229,.30)}.btn-icon{min-width:24px;display:inline-flex;align-items:center;justify-content:center;font-size:20px;line-height:1}.btn-text{font-size:16px;font-weight:600;line-height:1.4}
.notice-modal{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:max(22px,env(safe-area-inset-top)) 20px max(22px,env(safe-area-inset-bottom));background:rgba(27,39,60,.44);opacity:0;visibility:hidden;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);transition:opacity .2s ease,visibility .2s ease}.notice-modal.show{opacity:1;visibility:visible}
.notice-panel{width:100%;max-width:430px;max-height:min(72vh,620px);display:flex;flex-direction:column;overflow:hidden;background:rgba(255,255,255,.97);border:1px solid rgba(255,255,255,.95);border-radius:20px;box-shadow:0 26px 70px rgba(36,57,88,.26);transform:translateY(14px) scale(.98);transition:transform .2s ease}.notice-modal.show .notice-panel{transform:translateY(0) scale(1)}
.notice-header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:18px 18px 15px;border-bottom:1px solid #edf0f4}.notice-title{color:#171a21;font-size:18px;font-weight:700}.notice-close{width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:50%;background:#eef2f7;color:#6a7280;font-size:22px;line-height:1;cursor:pointer}
.notice-content{overflow-y:auto;overscroll-behavior:contain;padding:20px;color:#464d59;font-size:14px;line-height:1.8;text-align:left;overflow-wrap:anywhere;word-break:break-word}.notice-content h1,.notice-content h2,.notice-content h3,.notice-content h4{margin-bottom:10px;color:#181c23;line-height:1.5}.notice-content h3{font-size:17px}.notice-content p+p{margin-top:12px}.notice-content a{color:#259bd7;text-decoration:none}.notice-content img,.notice-content video{max-width:100%;height:auto;border-radius:10px}.notice-content iframe{max-width:100%}.notice-content table{width:100%;display:block;overflow-x:auto;border-collapse:collapse}.notice-content pre{max-width:100%;overflow-x:auto;white-space:pre-wrap}.notice-date{margin-bottom:14px;color:#929aa7;font-size:12px}.notice-box{padding:15px;background:#f2f6fb;border-radius:13px}.notice-loading,.notice-error{padding:8px 0;text-align:center;color:#8a93a1}.notice-error{color:#c05a67}
@media (min-width:900px){.ambient-light.main{width:980px;height:980px;transform:translate(-50%,-50%)}.container{max-width:520px;transform:translateY(3vh)}.brand{margin-bottom:34px}.avatar-wrap{width:136px;height:136px;margin-bottom:16px}.avatar{width:108px;height:108px}.title{font-size:30px}.desc{font-size:17px}.brand-line{width:50px;margin-top:16px}.menu{gap:16px}.btn{min-height:68px;border-radius:20px}.btn-icon{font-size:22px}.btn-text{font-size:18px}}
@media (max-width:768px){.container{max-width:360px;transform:translateY(5vh)}.ambient-light.main{width:560px;height:560px}.avatar-wrap{width:110px;height:110px}.avatar{width:88px;height:88px}.title{font-size:23px}}
@media (max-width:390px){body{padding-right:16px;padding-left:16px}.container{width:94%;transform:translateY(4vh)}.brand{margin-bottom:26px}.avatar-wrap{width:104px;height:104px;margin-bottom:11px}.avatar{width:84px;height:84px}.title{margin-bottom:5px;font-size:22px}.desc{font-size:14px}.brand-line{margin-top:12px}.menu{gap:12px}.btn{min-height:58px;padding:14px 18px;border-radius:17px}.btn-icon{font-size:19px}.btn-text{font-size:15px}.notice-modal{padding-right:16px;padding-left:16px}.notice-panel{max-height:75vh;border-radius:18px}}
@media (max-height:720px){.container{transform:translateY(2vh)}.brand{margin-bottom:22px}.avatar-wrap{width:96px;height:96px;margin-bottom:9px}.avatar{width:78px;height:78px}.title{font-size:21px}.desc{font-size:13px}.brand-line{margin-top:10px}.menu{gap:10px}.btn{min-height:54px;padding:12px 18px}}
@media (prefers-reduced-motion:reduce){.btn,.notice-modal,.notice-panel{transition:none}}
</style>
</head>
<body>
<div class="ambient-light main"></div><div class="ambient-light top"></div><div class="ambient-light bottom"></div>
<main class="container">
<header class="brand"><div class="avatar-wrap"><div class="avatar" role="img" aria-label="ACG游戏社头像"></div></div><h1 class="title">ACG游戏社</h1><p class="desc">免费分享，不负热爱</p><div class="brand-line"></div></header>
<nav class="menu" aria-label="网站导航">
<a href="https://www.acgyxs.org" class="btn primary" target="_blank" rel="noopener noreferrer"><span class="btn-icon">🌐</span><span class="btn-text">进入网站</span></a>
<button class="btn" id="noticeOpen" type="button"><span class="btn-icon">📢</span><span class="btn-text">网站公告</span></button>
<a href="https://qm.qq.com/q/2mxNsMxaQo" class="btn" target="_blank" rel="noopener noreferrer"><span class="btn-icon">💬</span><span class="btn-text">加入群聊</span></a>
<a href="https://t.me/acgyxs" class="btn" target="_blank" rel="noopener noreferrer"><span class="btn-icon">✉️</span><span class="btn-text">联系站长</span></a>
</nav></main>
<div class="notice-modal" id="noticeModal" role="dialog" aria-modal="true" aria-labelledby="noticeTitle"><section class="notice-panel" id="noticePanel"><header class="notice-header"><h2 class="notice-title" id="noticeTitle">网站公告</h2><button class="notice-close" id="noticeClose" type="button" aria-label="关闭公告">×</button></header><div class="notice-content" id="noticeContent"><div class="notice-loading">正在加载公告...</div></div></section></div>
<script>
const noticeOpen=document.getElementById("noticeOpen"),noticeModal=document.getElementById("noticeModal"),noticePanel=document.getElementById("noticePanel"),noticeClose=document.getElementById("noticeClose"),noticeContent=document.getElementById("noticeContent");let noticeLoaded=false;
async function loadNotice(){if(noticeLoaded)return;noticeContent.innerHTML='<div class="notice-loading">正在加载公告...</div>';try{const response=await fetch("./notice.html",{cache:"no-store"});if(!response.ok)throw new Error("HTTP "+response.status);const html=await response.text();noticeContent.innerHTML=html.trim()?html:'<div class="notice-loading">暂无公告</div>';noticeLoaded=true}catch(error){noticeContent.innerHTML='<div class="notice-error">公告加载失败，请稍后重试。</div>';console.error("公告加载失败：",error)}}
async function openNotice(){noticeModal.classList.add("show");document.body.classList.add("modal-open");noticeClose.focus();await loadNotice()}function closeNotice(){noticeModal.classList.remove("show");document.body.classList.remove("modal-open");noticeOpen.focus()}
noticeOpen.addEventListener("click",openNotice);noticeClose.addEventListener("click",closeNotice);noticeModal.addEventListener("click",e=>{if(e.target===noticeModal)closeNotice()});noticePanel.addEventListener("click",e=>e.stopPropagation());document.addEventListener("keydown",e=>{if(e.key==="Escape"&&noticeModal.classList.contains("show"))closeNotice()});
</script>
</body>
</html>
