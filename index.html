<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover"
    >

    <meta
        name="description"
        content="ACG游戏社官方发布页，获取网站入口、公告及交流群信息。"
    >

    <meta name="theme-color" content="#eaf5ff">

    <!-- 尽量减少浏览器直接使用旧页面 -->
    <meta
        http-equiv="Cache-Control"
        content="no-cache, no-store, must-revalidate"
    >
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>ACG游戏社 - 官方发布页</title>

    <link
        rel="icon"
        type="image/webp"
        href="./assets/avatar.webp"
    >

    <style>
        :root {
            --text-main: #26364d;
            --text-secondary: #6d7b90;
            --primary: #168fe5;
            --primary-light: #5cbcff;
            --primary-dark: #0879d1;

            --card-bg: rgba(255, 255, 255, 0.78);
            --card-border: rgba(255, 255, 255, 0.72);

            --shadow:
                0 22px 65px rgba(45, 104, 160, 0.16),
                inset 0 1px 0 rgba(255, 255, 255, 0.85);
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: #eaf5ff;
            -webkit-text-size-adjust: 100%;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;

            padding:
                calc(24px + env(safe-area-inset-top))
                18px
                calc(24px + env(safe-area-inset-bottom));

            display: flex;
            align-items: center;
            justify-content: center;

            color: var(--text-main);

            background:
                radial-gradient(
                    circle at 15% 18%,
                    rgba(120, 199, 255, 0.48),
                    transparent 34%
                ),
                radial-gradient(
                    circle at 88% 20%,
                    rgba(185, 167, 255, 0.28),
                    transparent 31%
                ),
                radial-gradient(
                    circle at 50% 92%,
                    rgba(100, 205, 255, 0.28),
                    transparent 38%
                ),
                linear-gradient(
                    145deg,
                    #eef8ff 0%,
                    #e7f2ff 48%,
                    #f3f0ff 100%
                );

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                Arial,
                sans-serif;

            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            z-index: 0;
            border-radius: 999px;
            pointer-events: none;
            filter: blur(4px);
        }

        body::before {
            top: 8%;
            left: -90px;
            width: 230px;
            height: 230px;
            background: rgba(87, 181, 250, 0.17);
        }

        body::after {
            right: -100px;
            bottom: 5%;
            width: 270px;
            height: 270px;
            background: rgba(154, 142, 247, 0.13);
        }

        button,
        a {
            font: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        button {
            border: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            width: min(100%, 420px);
        }

        .main-card {
            position: relative;
            overflow: hidden;
            padding: 32px 24px 22px;

            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;

            box-shadow: var(--shadow);

            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .main-card::before {
            content: "";
            position: absolute;
            top: -90px;
            right: -80px;
            width: 220px;
            height: 220px;

            background:
                radial-gradient(
                    circle,
                    rgba(71, 170, 244, 0.17),
                    transparent 68%
                );

            border-radius: 50%;
            pointer-events: none;
        }

        .brand {
            position: relative;
            text-align: center;
        }

        .avatar-wrap {
            position: relative;
            display: inline-flex;
            margin-bottom: 16px;
        }

        .avatar-wrap::before {
            content: "";
            position: absolute;
            inset: -6px;

            background:
                linear-gradient(
                    135deg,
                    rgba(91, 188, 255, 0.48),
                    rgba(177, 153, 255, 0.32)
                );

            border-radius: 28px;
            filter: blur(8px);
            opacity: 0.75;
        }

        .avatar {
            position: relative;
            display: block;

            width: 92px;
            height: 92px;

            object-fit: cover;
            background: #ffffff;

            border: 4px solid rgba(255, 255, 255, 0.88);
            border-radius: 25px;

            box-shadow:
                0 13px 30px rgba(44, 113, 172, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .site-name {
            margin: 0;
            color: #26364d;
            font-size: 25px;
            font-weight: 800;
            line-height: 1.35;
            letter-spacing: 0.8px;
        }

        .site-description {
            margin: 8px 0 0;
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.7;
            letter-spacing: 0.3px;
        }

        .slogan {
            display: inline-flex;
            align-items: center;
            gap: 6px;

            margin-top: 13px;
            padding: 6px 12px;

            color: #287fb9;
            background: rgba(65, 165, 235, 0.09);
            border: 1px solid rgba(70, 166, 232, 0.15);
            border-radius: 999px;

            font-size: 12px;
            font-weight: 650;
        }

        .slogan-dot {
            width: 6px;
            height: 6px;

            background: #29a1ec;
            border-radius: 50%;

            box-shadow:
                0 0 0 4px rgba(41, 161, 236, 0.11);
        }

        .actions {
            display: grid;
            gap: 11px;
            margin-top: 26px;
        }

        .action-button {
            position: relative;
            display: flex;
            align-items: center;

            width: 100%;
            min-height: 55px;
            padding: 10px 14px;

            color: #41516a;
            background: rgba(255, 255, 255, 0.66);

            border: 1px solid rgba(119, 167, 209, 0.17);
            border-radius: 16px;

            box-shadow:
                0 7px 20px rgba(55, 111, 160, 0.07),
                inset 0 1px 0 rgba(255, 255, 255, 0.78);

            text-align: left;
            text-decoration: none;
            cursor: pointer;

            transition:
                transform 0.2s ease,
                box-shadow 0.2s ease,
                background 0.2s ease;
        }

        .action-button:hover {
            background: rgba(255, 255, 255, 0.86);

            box-shadow:
                0 10px 25px rgba(55, 111, 160, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);

            transform: translateY(-1px);
        }

        .action-button:active {
            transform: scale(0.985);
        }

        .action-button-primary {
            color: #ffffff;

            background:
                linear-gradient(
                    135deg,
                    #35acf4 0%,
                    #168fe5 54%,
                    #0879d1 100%
                );

            border-color: rgba(255, 255, 255, 0.22);

            box-shadow:
                0 12px 27px rgba(14, 132, 220, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.28);
        }

        .action-button-primary:hover {
            background:
                linear-gradient(
                    135deg,
                    #42b5fa 0%,
                    #198fe4 55%,
                    #0875c9 100%
                );

            box-shadow:
                0 14px 31px rgba(14, 132, 220, 0.31),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .action-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;

            width: 37px;
            height: 37px;
            margin-right: 12px;

            color: #168ad9;
            background: rgba(38, 151, 226, 0.1);
            border-radius: 12px;
        }

        .action-button-primary .action-icon {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.17);
        }

        .action-icon svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
        }

        .action-text {
            display: flex;
            flex: 1;
            flex-direction: column;
            min-width: 0;
        }

        .action-title {
            font-size: 15px;
            font-weight: 750;
            line-height: 1.35;
        }

        .action-description {
            margin-top: 2px;
            color: #8995a6;
            font-size: 11px;
            font-weight: 450;
            line-height: 1.4;
        }

        .action-button-primary .action-description {
            color: rgba(255, 255, 255, 0.75);
        }

        .action-arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;

            width: 28px;
            height: 28px;
            margin-left: 8px;

            color: #9ba7b5;
        }

        .action-button-primary .action-arrow {
            color: rgba(255, 255, 255, 0.8);
        }

        .action-arrow svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
        }

        .footer {
            margin-top: 20px;
            color: #8d99aa;
            font-size: 11px;
            line-height: 1.7;
            text-align: center;
        }

        .footer p {
            margin: 0;
        }

        /* ==============================
           网站公告弹窗
        ============================== */

        .notice-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;

            display: flex;
            align-items: center;
            justify-content: center;

            padding:
                calc(18px + env(safe-area-inset-top))
                18px
                calc(18px + env(safe-area-inset-bottom));

            background: rgba(41, 65, 93, 0.3);

            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            opacity: 0;
            visibility: hidden;
            pointer-events: none;

            transition:
                opacity 0.24s ease,
                visibility 0.24s ease;
        }

        .notice-modal.is-open {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .notice-dialog {
            display: flex;
            flex-direction: column;

            width: min(100%, 470px);

            max-height: min(84vh, 760px);
            max-height: min(84dvh, 760px);

            overflow: hidden;

            background: rgba(255, 255, 255, 0.93);
            border: 1px solid rgba(255, 255, 255, 0.82);
            border-radius: 27px;

            box-shadow:
                0 28px 80px rgba(31, 67, 105, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);

            transform: translateY(14px) scale(0.97);

            transition: transform 0.24s ease;
        }

        .notice-modal.is-open .notice-dialog {
            transform: translateY(0) scale(1);
        }

        .notice-header {
            display: flex;
            align-items: center;
            flex: 0 0 auto;

            min-height: 76px;
            padding: 17px 18px 15px 23px;

            border-bottom:
                1px solid rgba(112, 147, 180, 0.13);
        }

        .notice-heading {
            flex: 1;
            min-width: 0;
        }

        .notice-title {
            margin: 0;
            color: #26364d;
            font-size: 20px;
            font-weight: 800;
            line-height: 1.35;
        }

        .notice-date {
            display: block;
            margin-top: 3px;
            color: #98a3b2;
            font-size: 11px;
            line-height: 1.4;
        }

        .notice-date[hidden] {
            display: none;
        }

        .notice-close {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;

            width: 42px;
            height: 42px;
            margin-left: 12px;

            color: #7e8b9d;
            background: rgba(111, 138, 165, 0.09);
            border-radius: 50%;

            cursor: pointer;

            transition:
                background 0.2s ease,
                color 0.2s ease,
                transform 0.2s ease;
        }

        .notice-close:hover {
            color: #526175;
            background: rgba(111, 138, 165, 0.15);
        }

        .notice-close:active {
            transform: scale(0.92);
        }

        .notice-close svg {
            width: 23px;
            height: 23px;
            stroke: currentColor;
        }

        .notice-body {
            flex: 1;
            min-height: 0;

            padding: 20px 22px 24px;

            overflow-x: hidden;
            overflow-y: auto;

            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }

        .notice-loading,
        .notice-error {
            display: flex;
            align-items: center;
            justify-content: center;

            min-height: 220px;

            color: #7f8c9e;
            font-size: 14px;
            line-height: 1.7;
            text-align: center;
        }

        .notice-loading {
            flex-direction: column;
            gap: 12px;
        }

        .loading-spinner {
            width: 28px;
            height: 28px;

            border: 3px solid rgba(32, 145, 222, 0.14);
            border-top-color: #2091de;
            border-radius: 50%;

            animation: notice-spin 0.75s linear infinite;
        }

        @keyframes notice-spin {
            to {
                transform: rotate(360deg);
            }
        }

        body.modal-open {
            overflow: hidden;
        }

        /* ==============================
           手机端适配
        ============================== */

        @media (max-width: 480px) {
            body {
                align-items: flex-start;

                padding:
                    calc(18px + env(safe-area-inset-top))
                    14px
                    calc(18px + env(safe-area-inset-bottom));
            }

            .main-card {
                padding: 28px 19px 20px;
                border-radius: 25px;
            }

            .avatar {
                width: 86px;
                height: 86px;
                border-radius: 23px;
            }

            .site-name {
                font-size: 23px;
            }

            .actions {
                margin-top: 23px;
            }

            .action-button {
                min-height: 53px;
                padding: 9px 12px;
                border-radius: 15px;
            }

            .notice-modal {
                align-items: center;

                padding:
                    calc(13px + env(safe-area-inset-top))
                    13px
                    calc(13px + env(safe-area-inset-bottom));
            }

            .notice-dialog {
                max-height: 88vh;
                max-height: 88dvh;
                border-radius: 25px;
            }

            .notice-header {
                min-height: 70px;
                padding: 15px 15px 14px 20px;
            }

            .notice-title {
                font-size: 19px;
            }

            .notice-close {
                width: 40px;
                height: 40px;
            }

            .notice-body {
                padding: 17px 18px 21px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

    <!-- 网站公告弹窗 -->
    <div
        class="notice-modal"
        id="noticeModal"
        aria-hidden="true"
    >
        <section
            class="notice-dialog"
            role="dialog"
            aria-modal="true"
            aria-labelledby="noticeModalTitle"
        >
            <header class="notice-header">
                <div class="notice-heading">
                    <h2
                        class="notice-title"
                        id="noticeModalTitle"
                    >
                        网站公告
                    </h2>

                    <time
                        class="notice-date"
                        id="noticeDate"
                        hidden
                    ></time>
                </div>

                <button
                    class="notice-close"
                    id="closeNotice"
                    type="button"
                    aria-label="关闭网站公告"
                >
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke-width="2"
                        stroke-linecap="round"
                    >
                        <path d="M6 6l12 12"></path>
                        <path d="M18 6 6 18"></path>
                    </svg>
                </button>
            </header>

            <div
                class="notice-body"
                id="noticeBody"
                aria-live="polite"
            >
                <div class="notice-loading">
                    <span class="loading-spinner"></span>
                    <span>公告加载中...</span>
                </div>
            </div>
        </section>
    </div>

    <script>
        (() => {
            "use strict";

            const NOTICE_URL = "./notice.html";

            const openButton =
                document.getElementById("openNotice");

            const closeButton =
                document.getElementById("closeNotice");

            const modal =
                document.getElementById("noticeModal");

            const noticeBody =
                document.getElementById("noticeBody");

            const noticeDate =
                document.getElementById("noticeDate");

            let lastFocusedElement = null;
            let requestController = null;

            function formatModifiedTime(value) {
                const date = new Date(value);

                if (Number.isNaN(date.getTime())) {
                    return "";
                }

                return new Intl.DateTimeFormat("zh-CN", {
                    year: "numeric",
                    month: "long",
                    day: "numeric",
                    hour: "2-digit",
                    minute: "2-digit",
                    hour12: false
                }).format(date);
            }

            function showLoading() {
                noticeBody.innerHTML = `
                    <div class="notice-loading">
                        <span class="loading-spinner"></span>
                        <span>公告加载中...</span>
                    </div>
                `;

                noticeDate.textContent = "";
                noticeDate.hidden = true;
            }

            async function loadNotice() {
                showLoading();

                /*
                 * 如果上一次公告请求还没有结束，
                 * 先取消上一次请求。
                 */
                if (requestController) {
                    requestController.abort();
                }

                requestController = new AbortController();

                try {
                    /*
                     * 每次打开公告都生成一个新地址，
                     * 避免浏览器和中间缓存返回旧公告。
                     */
                    const noticeUrl = new URL(
                        NOTICE_URL,
                        window.location.href
                    );

                    noticeUrl.searchParams.set(
                        "_refresh",
                        Date.now().toString()
                    );

                    const response = await fetch(
                        noticeUrl.toString(),
                        {
                            method: "GET",
                            cache: "no-store",
                            credentials: "same-origin",
                            signal: requestController.signal,
                            headers: {
                                "Cache-Control": "no-cache",
                                "Pragma": "no-cache"
                            }
                        }
                    );

                    if (!response.ok) {
                        throw new Error(
                            `公告请求失败：${response.status}`
                        );
                    }

                    const lastModified =
                        response.headers.get("last-modified");

                    const html = await response.text();

                    if (!html.trim()) {
                        throw new Error("公告内容为空");
                    }

                    /*
                     * notice.html 中的样式和公告内容
                     * 会一起加载到弹窗中。
                     */
                    noticeBody.innerHTML = html;

                    /*
                     * 日期来自 notice.html 的响应时间。
                     * 获取不到就不显示，不生成虚假日期。
                     */
                    if (lastModified) {
                        const formattedTime =
                            formatModifiedTime(lastModified);

                        if (formattedTime) {
                            noticeDate.textContent =
                                `更新于 ${formattedTime}`;

                            noticeDate.hidden = false;
                        }
                    }
                } catch (error) {
                    if (error.name === "AbortError") {
                        return;
                    }

                    console.error(error);

                    noticeBody.innerHTML = `
                        <div class="notice-error">
                            公告暂时无法加载，请稍后刷新页面重试。
                        </div>
                    `;
                }
            }

            function openNotice() {
                lastFocusedElement = document.activeElement;

                modal.classList.add("is-open");
                modal.setAttribute("aria-hidden", "false");

                document.body.classList.add("modal-open");

                /*
                 * 每次点击网站公告，都重新加载 notice.html。
                 */
                loadNotice();

                window.setTimeout(() => {
                    closeButton.focus({
                        preventScroll: true
                    });
                }, 50);
            }

            function closeNotice() {
                modal.classList.remove("is-open");
                modal.setAttribute("aria-hidden", "true");

                document.body.classList.remove("modal-open");

                if (
                    lastFocusedElement &&
                    typeof lastFocusedElement.focus === "function"
                ) {
                    lastFocusedElement.focus({
                        preventScroll: true
                    });
                }
            }

            openButton.addEventListener(
                "click",
                openNotice
            );

            closeButton.addEventListener(
                "click",
                closeNotice
            );

            modal.addEventListener("click", event => {
                if (event.target === modal) {
                    closeNotice();
                }
            });

            document.addEventListener("keydown", event => {
                if (
                    event.key === "Escape" &&
                    modal.classList.contains("is-open")
                ) {
                    closeNotice();
                }
            });

            /*
             * 手机浏览器从后台、前进或后退恢复页面时，
             * 清除弹窗中可能保留的旧公告。
             */
            window.addEventListener("pageshow", event => {
                if (event.persisted) {
                    showLoading();

                    modal.classList.remove("is-open");
                    modal.setAttribute(
                        "aria-hidden",
                        "true"
                    );

                    document.body.classList.remove(
                        "modal-open"
                    );
                }
            });
        })();
    </script>
</body>
</html>
