<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover"
    >

    <meta
        name="description"
        content="ACG游戏社官方发布页，获取网站入口、公告及交流群信息。"
    >

    <meta name="theme-color" content="#dcecff">

    <meta
        http-equiv="Cache-Control"
        content="no-cache, no-store, must-revalidate"
    >
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>ACG游戏社 - 官方发布页</title>

    <link
        rel="icon"
        type="image/webp"
        href="./assets/avatar.webp"
    >

    <style>
        :root {
            --text-main: #17233a;
            --text-secondary: #66758d;
            --text-light: #8c99ac;

            --primary-start: #49b7ff;
            --primary-middle: #22a7f4;
            --primary-end: #0e8fe8;

            --button-bg: rgba(255, 255, 255, 0.73);
            --button-border: rgba(255, 255, 255, 0.82);

            --shadow-blue:
                0 16px 42px rgba(52, 134, 208, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: #dcecff;
            -webkit-text-size-adjust: 100%;
        }

        body {
            position: relative;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            overflow-x: hidden;

            color: var(--text-main);

            background:
                radial-gradient(
                    circle at 50% 18%,
                    rgba(255, 255, 255, 0.82) 0,
                    rgba(255, 255, 255, 0.34) 22%,
                    transparent 48%
                ),
                radial-gradient(
                    circle at 12% 48%,
                    rgba(94, 188, 255, 0.25) 0,
                    transparent 38%
                ),
                radial-gradient(
                    circle at 90% 74%,
                    rgba(152, 145, 255, 0.22) 0,
                    transparent 42%
                ),
                linear-gradient(
                    155deg,
                    #e8f5ff 0%,
                    #d9ecff 42%,
                    #d8e3ff 72%,
                    #d9dcff 100%
                );

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                Arial,
                sans-serif;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            z-index: 0;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(10px);
        }

        body::before {
            top: 5%;
            left: -110px;
            width: 300px;
            height: 300px;
            background: rgba(103, 197, 255, 0.17);
        }

        body::after {
            right: -130px;
            bottom: 3%;
            width: 340px;
            height: 340px;
            background: rgba(158, 149, 255, 0.15);
        }

        button,
        a {
            font: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        button {
            border: 0;
        }

        .release-page {
            position: relative;
            z-index: 1;

            display: flex;
            flex-direction: column;

            width: min(100%, 520px);
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0 auto;

            padding:
                calc(58px + env(safe-area-inset-top))
                28px
                calc(22px + env(safe-area-inset-bottom));
        }

        .release-main {
            display: flex;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            width: 100%;
        }

        .brand {
            text-align: center;
        }

        .avatar-shell {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;

            width: 126px;
            height: 126px;
            margin-bottom: 23px;

            border-radius: 50%;

            background:
                linear-gradient(
                    145deg,
                    rgba(255, 255, 255, 0.84),
                    rgba(255, 255, 255, 0.38)
                );

            box-shadow:
                0 0 0 12px rgba(255, 255, 255, 0.18),
                0 0 45px rgba(64, 168, 240, 0.28),
                0 18px 40px rgba(67, 129, 190, 0.17);

            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .avatar-shell::before {
            content: "";
            position: absolute;
            inset: -11px;

            border: 1px solid rgba(255, 255, 255, 0.38);
            border-radius: inherit;

            box-shadow:
                inset 0 0 25px rgba(79, 179, 246, 0.13);
        }

        .avatar {
            position: relative;
            z-index: 1;

            display: block;
            width: 104px;
            height: 104px;

            object-fit: cover;
            background: #ffffff;

            border: 5px solid rgba(255, 255, 255, 0.9);
            border-radius: 50%;

            box-shadow:
                0 10px 26px rgba(48, 113, 174, 0.18);
        }

        .site-name {
            margin: 0;

            color: #162137;
            font-size: clamp(28px, 7.2vw, 35px);
            font-weight: 850;
            line-height: 1.25;
            letter-spacing: 0.4px;
        }

        .site-slogan {
            margin: 14px 0 0;

            color: #65738a;
            font-size: 17px;
            font-weight: 450;
            line-height: 1.6;
            letter-spacing: 2px;
        }

        .brand-divider {
            width: 66px;
            height: 4px;
            margin: 25px auto 0;

            background: rgba(255, 255, 255, 0.8);
            border-radius: 999px;

            box-shadow:
                0 2px 10px rgba(255, 255, 255, 0.5);
        }

        .actions {
            display: grid;
            gap: 14px;
            width: 100%;
            margin-top: 43px;
        }

        .action-button {
            position: relative;

            display: flex;
            align-items: center;

            width: 100%;
            min-height: 66px;
            padding: 11px 18px;

            color: #26344a;
            background: var(--button-bg);

            border: 1px solid var(--button-border);
            border-radius: 22px;

            box-shadow:
                0 12px 28px rgba(54, 108, 164, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);

            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            text-decoration: none;
            text-align: left;
            cursor: pointer;

            transition:
                transform 0.2s ease,
                background 0.2s ease,
                box-shadow 0.2s ease;
        }

        .action-button:hover {
            background: rgba(255, 255, 255, 0.86);

            box-shadow:
                0 15px 32px rgba(54, 108, 164, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.94);

            transform: translateY(-1px);
        }

        .action-button:active {
            transform: scale(0.985);
        }

        .action-button-primary {
            min-height: 70px;

            color: #ffffff;

            background:
                linear-gradient(
                    135deg,
                    var(--primary-start) 0%,
                    var(--primary-middle) 48%,
                    var(--primary-end) 100%
                );

            border-color: rgba(255, 255, 255, 0.34);

            box-shadow:
                0 15px 32px rgba(17, 150, 232, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.32);
        }

        .action-button-primary:hover {
            background:
                linear-gradient(
                    135deg,
                    #57c0ff 0%,
                    #29acf7 48%,
                    #1089df 100%
                );

            box-shadow:
                0 18px 38px rgba(17, 150, 232, 0.36),
                inset 0 1px 0 rgba(255, 255, 255, 0.36);
        }

        .action-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;

            width: 42px;
            height: 42px;
            margin-right: 14px;

            color: #258ed3;
            background: rgba(54, 151, 218, 0.1);
            border-radius: 15px;
        }

        .action-button-primary .action-icon {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.18);
        }

        .action-icon svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
        }

        .action-text {
            display: flex;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .action-title {
            font-size: 17px;
            font-weight: 800;
            line-height: 1.35;
        }

        .action-description {
            margin-top: 3px;

            color: #8793a4;
            font-size: 12px;
            font-weight: 450;
            line-height: 1.4;
        }

        .action-button-primary .action-description {
            color: rgba(255, 255, 255, 0.76);
        }

        .action-arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;

            width: 30px;
            height: 30px;
            margin-left: 10px;

            color: #97a4b5;
        }

        .action-button-primary .action-arrow {
            color: rgba(255, 255, 255, 0.84);
        }

        .action-arrow svg {
            width: 19px;
            height: 19px;
            stroke: currentColor;
        }

        .page-footer {
            flex: 0 0 auto;
            margin-top: 34px;

            color: rgba(82, 99, 124, 0.66);
            font-size: 11px;
            line-height: 1.8;
            text-align: center;
        }

        .page-footer p {
            margin: 0;
        }

        /* =========================
           公告弹窗
        ========================= */

        .notice-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;

            display: flex;
            align-items: center;
            justify-content: center;

            padding:
                calc(16px + env(safe-area-inset-top))
                14px
                calc(16px + env(safe-area-inset-bottom));

            background: rgba(38, 62, 91, 0.31);

            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);

            opacity: 0;
            visibility: hidden;
            pointer-events: none;

            transition:
                opacity 0.24s ease,
                visibility 0.24s ease;
        }

        .notice-modal.is-open {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .notice-dialog {
            display: flex;
            flex-direction: column;

            width: min(100%, 480px);
            max-height: min(88vh, 780px);
            max-height: min(88dvh, 780px);

            overflow: hidden;

            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.86);
            border-radius: 28px;

            box-shadow:
                0 30px 85px rgba(27, 61, 100, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.92);

            transform: translateY(15px) scale(0.97);

            transition: transform 0.24s ease;
        }

        .notice-modal.is-open .notice-dialog {
            transform: translateY(0) scale(1);
        }

        .notice-header {
            display: flex;
            align-items: center;
            flex: 0 0 auto;

            min-height: 74px;
            padding: 16px 17px 15px 22px;

            border-bottom:
                1px solid rgba(111, 146, 179, 0.14);
        }

        .notice-heading {
            flex: 1;
            min-width: 0;
        }

        .notice-title {
            margin: 0;

            color: #26364d;
            font-size: 20px;
            font-weight: 850;
            line-height: 1.35;
        }

        .notice-date {
            display: block;
            margin-top: 3px;

            color: #95a0af;
            font-size: 11px;
            line-height: 1.4;
        }

        .notice-date[hidden] {
            display: none;
        }

        .notice-close {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;

            width: 42px;
            height: 42px;
            margin-left: 12px;

            color: #7c899a;
            background: rgba(105, 135, 164, 0.1);
            border-radius: 50%;

            cursor: pointer;

            transition:
                color 0.2s ease,
                background 0.2s ease,
                transform 0.2s ease;
        }

        .notice-close:hover {
            color: #526175;
            background: rgba(105, 135, 164, 0.16);
        }

        .notice-close:active {
            transform: scale(0.92);
        }

        .notice-close svg {
            width: 23px;
            height: 23px;
            stroke: currentColor;
        }

        .notice-body {
            flex: 1;
            min-height: 0;

            padding: 19px 21px 23px;

            overflow-x: hidden;
            overflow-y: auto;

            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }

        .notice-loading,
        .notice-error {
            display: flex;
            align-items: center;
            justify-content: center;

            min-height: 240px;

            color: #7f8c9e;
            font-size: 14px;
            line-height: 1.7;
            text-align: center;
        }

        .notice-loading {
            flex-direction: column;
            gap: 12px;
        }

        .loading-spinner {
            width: 29px;
            height: 29px;

            border: 3px solid rgba(32, 145, 222, 0.14);
            border-top-color: #2091de;
            border-radius: 50%;

            animation: notice-spin 0.75s linear infinite;
        }

        @keyframes notice-spin {
            to {
                transform: rotate(360deg);
            }
        }

        body.modal-open {
            overflow: hidden;
        }

        /* =========================
           手机端适配
        ========================= */

        @media (max-width: 560px) {
            .release-page {
                padding:
                    calc(34px + env(safe-area-inset-top))
                    23px
                    calc(18px + env(safe-area-inset-bottom));
            }

            .avatar-shell {
                width: 116px;
                height: 116px;
                margin-bottom: 20px;
            }

            .avatar {
                width: 96px;
                height: 96px;
            }

            .site-slogan {
                margin-top: 12px;
                font-size: 16px;
            }

            .brand-divider {
                margin-top: 22px;
            }

            .actions {
                gap: 13px;
                margin-top: 37px;
            }

            .action-button {
                min-height: 63px;
                padding: 10px 15px;
                border-radius: 20px;
            }

            .action-button-primary {
                min-height: 68px;
            }

            .action-icon {
                width: 40px;
                height: 40px;
                margin-right: 13px;
                border-radius: 14px;
            }

            .action-title {
                font-size: 16px;
            }

            .page-footer {
                margin-top: 28px;
            }

            .notice-dialog {
                border-radius: 25px;
            }

            .notice-body {
                padding: 17px 17px 21px;
            }
        }

        @media (max-height: 760px) and (max-width: 560px) {
            .release-page {
                padding-top:
                    calc(22px + env(safe-area-inset-top));
            }

            .avatar-shell {
                width: 100px;
                height: 100px;
                margin-bottom: 15px;
            }

            .avatar {
                width: 82px;
                height: 82px;
                border-width: 4px;
            }

            .site-name {
                font-size: 27px;
            }

            .site-slogan {
                margin-top: 8px;
                font-size: 15px;
            }

            .brand-divider {
                margin-top: 16px;
            }

            .actions {
                gap: 10px;
                margin-top: 27px;
            }

            .action-button,
            .action-button-primary {
                min-height: 58px;
            }

            .action-icon {
                width: 37px;
                height: 37px;
            }

            .page-footer {
                margin-top: 19px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <main class="release-page">
        <div class="release-main">
            <section class="brand">
                <div class="avatar-shell">
                    <img
                        class="avatar"
                        src="./assets/avatar.webp"

                    <span class="action-text">

        <footer class="page-footer">

    </main>

    <!-- 网站公告弹窗 -->
    <div
        class="notice-modal"
        id="noticeModal"
        aria-hidden="true"
    >
        <section
            class="notice-dialog"
            role="dialog"
            aria-modal="true"
            aria-labelledby="noticeModalTitle"
        >
            <header class="notice-header">
                <div class="notice-heading">
                    <h2
                        class="notice-title"
                        id="noticeModalTitle"
                    >
                        网站公告
                    </h2>

                    <time
                        class="notice-date"
                        id="noticeDate"
                        hidden
                    ></time>
                </div>

                <button
                    class="notice-close"
                    id="closeNotice"
                    type="button"
                    aria-label="关闭网站公告"
                >
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke-width="2"
                        stroke-linecap="round"
                    >
                        <path d="M6 6l12 12"></path>
                        <path d="M18 6 6 18"></path>
                    </svg>
                </button>
            </header>

            <div
                class="notice-body"
                id="noticeBody"
                aria-live="polite"
            >
                <div class="notice-loading">
                    <span class="loading-spinner"></span>
                    <span>公告加载中...</span>
                </div>
            </div>
        </section>
    </div>

    <script>
        (() => {
            "use strict";

            const NOTICE_URL = "./notice.html";

            const openButton =
                document.getElementById("openNotice");

            const closeButton =
                document.getElementById("closeNotice");

            const modal =
                document.getElementById("noticeModal");

            const noticeBody =
                document.getElementById("noticeBody");

            const noticeDate =
                document.getElementById("noticeDate");

            let lastFocusedElement = null;
            let requestController = null;

            function formatModifiedTime(value) {
                const date = new Date(value);

                if (Number.isNaN(date.getTime())) {
                    return "";
                }

                return new Intl.DateTimeFormat("zh-CN", {
                    year: "numeric",
                    month: "long",
                    day: "numeric",
                    hour: "2-digit",
                    minute: "2-digit",
                    hour12: false
                }).format(date);
            }

            function showLoading() {
                noticeBody.innerHTML = `
                    <div class="notice-loading">
                        <span class="loading-spinner"></span>
                        <span>公告加载中...</span>
                    </div>
                `;

                noticeDate.textContent = "";
                noticeDate.hidden = true;
            }

            async function loadNotice() {
                showLoading();

                if (requestController) {
                    requestController.abort();
                }

                requestController = new AbortController();

                try {
                    const noticeUrl = new URL(
                        NOTICE_URL,
                        window.location.href
                    );

                    noticeUrl.searchParams.set(
                        "_refresh",
                        Date.now().toString()
                    );

                    const response = await fetch(
                        noticeUrl.toString(),
                        {
                            method: "GET",
                            cache: "no-store",
                            credentials: "same-origin",
                            signal: requestController.signal
                        }
                    );

                    if (!response.ok) {
                        throw new Error(
                            `公告请求失败：${response.status}`
                        );
                    }

                    const lastModified =
                        response.headers.get("last-modified");

                    const html = await response.text();

                    if (!html.trim()) {
                        throw new Error("公告内容为空");
                    }

                    noticeBody.innerHTML = html;

                    if (lastModified) {
                        const formattedTime =
                            formatModifiedTime(lastModified);

                        if (formattedTime) {
                            noticeDate.textContent =
                                `更新于 ${formattedTime}`;

                            noticeDate.hidden = false;
                        }
                    }
                } catch (error) {
                    if (error.name === "AbortError") {
                        return;
                    }

                    console.error(error);

                    noticeBody.innerHTML = `
                        <div class="notice-error">
                            公告暂时无法加载，请稍后刷新页面重试。
                        </div>
                    `;
                }
            }

            function openNotice() {
                lastFocusedElement = document.activeElement;

                modal.classList.add("is-open");
                modal.setAttribute("aria-hidden", "false");

                document.body.classList.add("modal-open");

                loadNotice();

                window.setTimeout(() => {
                    closeButton.focus({
                        preventScroll: true
                    });
                }, 50);
            }

            function closeNotice() {
                modal.classList.remove("is-open");
                modal.setAttribute("aria-hidden", "true");

                document.body.classList.remove("modal-open");

                if (
                    requestController &&
                    modal.getAttribute("aria-hidden") === "true"
                ) {
                    requestController.abort();
                    requestController = null;
                }

                if (
                    lastFocusedElement &&
                    typeof lastFocusedElement.focus === "function"
                ) {
                    lastFocusedElement.focus({
                        preventScroll: true
                    });
                }
            }

            openButton.addEventListener(
                "click",
                openNotice
            );

            closeButton.addEventListener(
                "click",
                closeNotice
            );

            modal.addEventListener("click", event => {
                if (event.target === modal) {
                    closeNotice();
                }
            });

            document.addEventListener("keydown", event => {
                if (
                    event.key === "Escape" &&
                    modal.classList.contains("is-open")
                ) {
                    closeNotice();
                }
            });

            window.addEventListener("pageshow", event => {
                if (!event.persisted) {
                    return;
                }

                modal.classList.remove("is-open");
                modal.setAttribute("aria-hidden", "true");

                document.body.classList.remove("modal-open");

                showLoading();
            });
        })();
    </script>
</body>
</html>
