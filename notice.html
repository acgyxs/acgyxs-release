<style>
    .notice-content {

    .notice-card::before {

        top: -45px;
        right: -45px;
        width: 120px;
        height: 120px;
        background: rgba(55, 157, 239, 0.08);
        border-radius: 50%;
        pointer-events: none;

    .notice-content p {

    .notice-content p:last-of-type {

    .notice-content strong {

    .notice-code-row {

        border-radius: 7px;
        font-family: inherit;
        font-size: 15px;
        font-weight: 750;

    }

    .notice-tip {
        margin-top: 2px !important;
        color: #758196;
        font-size: 13px;
    }

    .notice-link {

        padding: 10px 18px;
        color: #fff;

        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(22, 139, 220, 0.2);
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
        transition:
            transform 0.2s ease,
            box-shadow 0.2s ease,
            filter 0.2s ease;
    }

    .notice-link:hover {
        filter: brightness(1.03);
        transform: translateY(-1px);
        box-shadow: 0 11px 24px rgba(22, 139, 220, 0.27);
    }

    .notice-link:active {
        transform: scale(0.985);
    }

    @media (max-width: 480px) {
        .notice-content {
            font-size: 14px;
        }

        .notice-content h2 {

            font-size: 19px;
        }

        .notice-card {

</style>
